<!DOCTYPE html>
<html>
<head>
    <title>Travel Planner</title>

    <style>
       body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    /* Soft mesh gradient for a more modern, premium look */
    background: radial-gradient(at 0% 0%, hsla(161,65%,85%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(188,78%,60%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(204,82%,70%,1) 0, transparent 50%);
    background-color: #e0f7fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 {
    color: #1f4037;
    margin-bottom: 10px;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
}

.container {
    /* Enhanced glass effect */
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(15px) saturate(180%);
    -webkit-backdrop-filter: blur(15px) saturate(180%);
    width: 350px;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    color: #2c3e50;
}

h3 {
    margin-bottom: 15px;
    font-weight: 600;
    opacity: 0.9;
}

select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    background: white;
    outline: none;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

select:focus {
    box-shadow: 0 0 0 3px rgba(153, 242, 200, 0.5);
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 25px;
}

li {
    background: rgba(255, 255, 255, 0.7);
    color: #2c3e50;
    margin: 12px 0;
    padding: 15px;
    border-radius: 16px;
    font-weight: 500;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
}

li:hover {
    transform: translateY(-5px);
    background: #ffffff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}
    </style>
</head>

<body>

<h1>Travel Planner</h1>

<div class="container">
    <h3>Select a place</h3>

    <select id="place" onchange="showSuggestions()">
        <option value="">-- Choose --</option>
        <option value="bangalore">Bangalore</option>
        <option value="lalbagh">Lalbagh</option>
        <option value="mysore">Mysore</option>
        <option value="coorg">Coorg</option>
        <option value="hampi">Hampi</option>
    </select>

    <ul id="suggestions"></ul>
</div>

<script>
function showSuggestions() {
    let place = document.getElementById("place").value;
    let suggestions = document.getElementById("suggestions");

    let data = {
        Bangalore: ["ISKCON Banglore", "Lalbagh Botanical Garden", "Vidhana Soudha"],
        Chikmagalur: ["Mullayanagiri Peak", "Baba Budangiri", "Coffee Plantations"],
        Mysore: ["Chamundi Hills", "Brindavan Gardens", "Mysore Zoo"],
        Coorg: ["Abbey Falls", "Raja Seat", "Coffee Estates"],
        Hampi: ["Virupaksha Temple", "Stone Chariot", "Lotus Mahal"]
    };

    let backgrounds = {
        bangalore: "url('https://upload.wikimedia.org/wikipedia/commons/5/5f/Vidhana_Soudha_Bangalore.jpg')",
        lalbagh: "url('https://upload.wikimedia.org/wikipedia/commons/3/3f/Lalbagh_Glass_House.jpg')",
        mysore: "url('https://upload.wikimedia.org/wikipedia/commons/7/7b/Mysore_Palace.jpg')",
        coorg: "url('https://upload.wikimedia.org/wikipedia/commons/1/12/Coorg_Hills.jpg')",
        hampi: "url('https://upload.wikimedia.org/wikipedia/commons/0/0c/Hampi_Stone_Chariot.jpg')"
    };

    // 🌄 Change background
    if (backgrounds[place]) {
        document.body.style.backgroundImage = backgrounds[place];
    } else {
        document.body.style.background = "linear-gradient(135deg, #1f4037, #99f2c8)";
    }

    suggestions.innerHTML = "";

    if (data[place]) {
        data[place].forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;
            suggestions.appendChild(li);
        });
    }
}
</script>

</body>
</html>
