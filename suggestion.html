<!DOCTYPE html>
<html>
<head>
    <title>Travel Suggestions</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-size: cover;
            background-position: center;
            transition: 0.5s;
        }

        h1 {
            color: white;
            margin-top: 30px;
            text-shadow: 2px 2px 5px black;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            width: 320px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f1f1f1;
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🌍 Travel Planner</h1>

<div class="container">
    <h3>Select a place</h3>

    <select id="place" onchange="showSuggestions()">
        <option value="">-- Choose --</option>
        <option value="bangalore">Bangalore</option>
        <option value="lalbagh">Lalbagh</option>
        <option value="mysore">Mysore</option>
        <option value="coorg">Coorg</option>
        <option value="hampi">Hampi</option>
    </select>

    <ul id="suggestions"></ul>
</div>

<script>
function showSuggestions() {
    let place = document.getElementById("place").value;
    let suggestions = document.getElementById("suggestions");

    let data = {
        bangalore: ["Cubbon Park", "MG Road", "Vidhana Soudha"],
        lalbagh: ["Bannerghatta Zoo", "Bull Temple", "Jayanagar"],
        mysore: ["Chamundi Hills", "Brindavan Gardens", "Zoo"],
        coorg: ["Abbey Falls", "Raja Seat", "Coffee Plantations"],
        hampi: ["Virupaksha Temple", "Stone Chariot", "Lotus Mahal"]
    };

    // 🌄 Background images
    let backgrounds = {
        bangalore: "https://upload.wikimedia.org/wikipedia/commons/5/5f/Vidhana_Soudha_Bangalore.jpg",
        lalbagh: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Lalbagh_Glass_House.jpg",
        mysore: "https://upload.wikimedia.org/wikipedia/commons/7/7b/Mysore_Palace.jpg",
        coorg: "https://upload.wikimedia.org/wikipedia/commons/1/12/Coorg_Hills.jpg",
        hampi: "https://upload.wikimedia.org/wikipedia/commons/0/0c/Hampi_Stone_Chariot.jpg"
    };

    // Change background
    document.body.style.backgroundImage = `url(${backgrounds[place]})`;

    suggestions.innerHTML = "";

    if (data[place]) {
        data[place].forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;
            suggestions.appendChild(li);
        });
    }
}
</script>

</body>
</html>
