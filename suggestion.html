<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnataka Travel Planner</title>
    <style>
        /* 1. Global Styles & Smooth Background Transitions */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            /* Initial Mesh Gradient */
            background: radial-gradient(at 0% 0%, hsla(161,65%,85%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(188,78%,60%,1) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, hsla(204,82%,70%,1) 0, transparent 50%);
            background-color: #e0f7fa;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.8s ease-in-out; /* Smooth fade effect */
        }

        /* 2. Typography */
        h1 {
            color: #1f4037;
            margin-bottom: 20px;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8);
        }

        /* 3. The Glassmorphism Container */
        .container {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            width: 350px;
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            color: #2c3e50;
        }

        h3 {
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 1.2rem;
        }

        /* 4. Interactive Elements */
        select {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: white;
            outline: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #2c3e50;
        }

        select:focus {
            box-shadow: 0 0 0 4px rgba(31, 64, 55, 0.2);
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }

        li {
            background: rgba(255, 255, 255, 0.85);
            color: #1f4037;
            margin: 12px 0;
            padding: 16px;
            border-radius: 18px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            opacity: 0; /* Starts hidden for JS animation */
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        li:hover {
            transform: translateY(-5px) scale(1.02);
            background: #ffffff;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
        }

        /* Animation class for the list items */
        .show-li {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>Travel Planner</h1>

    <div class="container">
        <h3>Where to next?</h3>

        <select id="place" onchange="showSuggestions()">
            <option value="">-- Choose a Destination --</option>
            <option value="bangalore">Bangalore</option>
            <option value="Chikmagalur">Chikmagalur</option>
            <option value="Mysore">Mysore</option>
            <option value="Coorg">Coorg</option>
            <option value="Hampi">Hampi</option>
        </select>

        <ul id="suggestions"></ul>
    </div>

    <script>
        function showSuggestions() {
            const place = document.getElementById("place").value;
            const suggestionsContainer = document.getElementById("suggestions");
            const body = document.body;

            // Destination Data
            const data = {
                Bangalore: ["ISKCON Temple", "Vidhana Soudha", "Bannerghatta Park"],
                Chikmagalur: ["Mullayanagiri Peak", "Baba Budangiri", "Coffee Plantations"],
                Mysore: ["Mysore Palace", "Chamundi Hills", "St. Philomena's Church"],
                Coorg: ["Abbey Falls", "Dubare Elephant Camp", "Talakaveri"],
                Hampi: ["Virupaksha Temple", "Vittala Stone Chariot", "Hemakuta Hill"]
            };

            // Background Images (using high-quality optimized links)
            const backgrounds = {
                Bangalore: "url('https://images.unsplash.com/photo-1596176530529-78163a4f7af2?auto=format&fit=crop&w=1600')",
                Chikmagalur: "url('https://ik.imagekit.io/xoxqszf3k/wp-content/uploads/2015/01/Capture.jpg')",
                Mysore: "url('https://media.istockphoto.com/id/172124032/photo/mysore-palace-at-dusk.jpg?s=1024x1024&w=is&k=20&c=eGEZM2d_giVdiF7UcLNUJ5mhBWJYM4PonfJO8w5C_vU=')",
                Coorg: "url('https://media.gettyimages.com/id/2153419113/photo/abbe-water-falls-of-coorg.jpg?s=612x612&w=gi&k=20&c=z5XjBTWppsPVb4KfimBH9Z9JvuDBNWnRCado-yYMHAM=')",
                Hampi: "url('https://media.gettyimages.com/id/464870363/photo/vittala-temple.jpg?s=612x612&w=gi&k=20&c=qtURpxA37b1TBkqutphaI3udGaFx0Wr_MFofzcOzO6w=')"
            };

            // 1. Update Background
            if (backgrounds[place]) {
                body.style.backgroundImage = backgrounds[place];
            } else {
                // Reset to Mesh Gradient if no selection
                body.style.backgroundImage = "radial-gradient(at 0% 0%, hsla(161,65%,85%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(188,78%,60%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(204,82%,70%,1) 0, transparent 50%)";
            }

            // 2. Update Suggestions with Animation
            suggestionsContainer.innerHTML = "";

            if (data[place]) {
                data[place].forEach((item, index) => {
                    const li = document.createElement("li");
                    li.innerText = item;
                    suggestionsContainer.appendChild(li);

                    // Staggered fade-in effect
                    setTimeout(() => {
                        li.classList.add('show-li');
                    }, index * 150); 
                });
            }
        }
    </script>

</body>
</html>
