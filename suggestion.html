<!DOCTYPE html>
<html>
<head>
    <title>Travel Suggestions</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            margin: 0;
            padding: 0;
        }

        h1 {
            color: #fff;
            margin-top: 30px;
        }

        .container {
            background: white;
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-top: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f1f1f1;
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        li:hover {
            background: #dfe9f3;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h1>🌍 Travel Planner</h1>

<div class="container">
    <h3>Select a place</h3>

    <select id="place" onchange="showSuggestions()">
        <option value="">-- Choose --</option>
        <option value="palace">Bangalore Palace</option>
        <option value="lalbagh">Lalbagh</option>
        <option value="mysore">Mysore Palace</option>
        <option value="coorg">Coorg</option>
        <option value="hampi">Hampi</option>
    </select>

    <ul id="suggestions"></ul>
</div>

<script>
function showSuggestions() {
    let place = document.getElementById("place").value;
    let suggestions = document.getElementById("suggestions");

    let data = {
        palace: ["Cubbon Park", "MG Road", "Vidhana Soudha"],
        lalbagh: ["Bannerghatta Zoo", "Bull Temple", "Jayanagar"],
        mysore: ["Chamundi Hills", "Brindavan Gardens", "Zoo"],
        coorg: ["Abbey Falls", "Raja Seat", "Coffee Plantations"],
        hampi: ["Virupaksha Temple", "Stone Chariot", "Lotus Mahal"]
    };

    suggestions.innerHTML = "";

    if (data[place]) {
        data[place].forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;
            suggestions.appendChild(li);
        });
    }
}
</script>

</body>
</html>
